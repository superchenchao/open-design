<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>munch.tv — Silicon Valley · Season 1</title>
<style>
  :root {
    --bg:      oklch(97% 0.004 150);
    --surface: oklch(100% 0 0);
    --fg:      oklch(18% 0.012 150);
    --muted:   oklch(50% 0.012 150);
    --border:  oklch(90% 0.006 150);
    --accent:  oklch(68% 0.18 145);
    --accent-ink: oklch(28% 0.10 145);
    --hl:      oklch(94% 0.06 145);
    --shell:   oklch(94% 0.005 150);
    --font-display: 'Iowan Old Style', 'Charter', Georgia, serif;
    --font-body:    -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    --font-mono:    'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--shell);
    color: var(--fg);
    font: 15px/1.45 var(--font-body);
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
  }
  body {
    display: grid;
    place-items: center;
    padding: 24px 16px;
  }
  a, button { color: inherit; text-decoration: none; font: inherit; }
  button { background: none; border: 0; cursor: pointer; padding: 0; }

  .stage {
    width: 100%;
    max-width: 440px;
    min-height: min(820px, calc(100vh - 48px));
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 60px -30px rgba(20, 28, 32, 0.35);
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .brand {
    font: 600 15px/1 var(--font-display);
    letter-spacing: -0.01em;
  }
  .brand .dot { color: var(--accent); }
  .topbar .pos {
    font: 11px/1 var(--font-mono);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .topbar .pos em {
    font-style: normal;
    color: var(--fg);
    font-weight: 600;
  }
  .topbar .skip {
    font: 11px/1 var(--font-mono);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 6px;
  }

  .progress-rail {
    display: flex;
    gap: 3px;
    margin-bottom: 16px;
  }
  .progress-rail span {
    flex: 1;
    height: 2px;
    background: var(--border);
    border-radius: 999px;
    transition: background 0.2s;
  }
  .progress-rail span.done   { background: var(--accent-ink); }
  .progress-rail span.active { background: var(--accent); }

  .card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 20px 24px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
    margin-bottom: 16px;
  }
  .card-head .src {
    font: 11px/1 var(--font-mono);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .card-head .src .show {
    color: var(--accent-ink);
    font-weight: 600;
  }
  .card-head .tag {
    font: 10px/1 var(--font-mono);
    color: var(--muted);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 4px 7px;
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .term-block { margin-bottom: 18px; }
  .term {
    font: 500 38px/1.05 var(--font-display);
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .ipa-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
  }
  .ipa { font: italic 14px/1 var(--font-display); }
  .pos {
    font: 10px/1 var(--font-mono);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 3px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .audio {
    width: 32px; height: 32px;
    display: grid; place-items: center;
    border: 1px solid var(--border);
    border-radius: 50%;
    margin-left: auto;
    color: var(--accent-ink);
    background: var(--surface);
    transition: background 0.15s, transform 0.08s, border-color 0.15s;
    font-size: 12px;
  }
  .audio:active { transform: scale(0.92); }
  .audio.playing {
    background: var(--accent);
    border-color: var(--accent);
    color: oklch(15% 0.04 150);
  }
  .audio.unsupported { opacity: 0.35; cursor: not-allowed; }

  .reveal-trigger {
    margin-top: auto;
    padding: 14px 0 8px;
    border-top: 1px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    font: 12px/1 var(--font-mono);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .reveal-trigger::before { content: '↓'; font-size: 14px; }

  .body { display: none; flex-direction: column; gap: 16px; overflow: auto; }
  .card.revealed .body { display: flex; }
  .card.revealed .reveal-trigger { display: none; }

  .gloss-block .label {
    font: 10px/1 var(--font-mono);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .gloss-block .zh {
    font-size: 16px;
    line-height: 1.5;
    color: var(--fg);
  }
  .gloss-block .en {
    font: italic 13px/1.5 var(--font-display);
    color: var(--muted);
    margin-top: 5px;
  }

  .ep-line {
    font: 11px/1.4 var(--font-mono);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 0 0;
    margin-top: auto;
    border-top: 1px solid var(--border);
  }
  .ep-line .ep-label { color: var(--accent-ink); font-weight: 600; }

  .srs {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
  }
  .srs button {
    padding: 12px 0 10px;
    border-radius: 10px;
    font: 600 13px/1 var(--font-body);
    letter-spacing: -0.005em;
    text-align: center;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: transform 0.08s, opacity 0.15s;
  }
  .srs button:active { transform: scale(0.97); }
  .srs button .interval {
    display: block;
    font: 10px/1 var(--font-mono);
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 4px;
    text-transform: uppercase;
  }
  .srs button.again { color: oklch(45% 0.13 25); }
  .srs button.hard  { color: var(--fg); }
  .srs button.good {
    background: var(--accent);
    color: oklch(15% 0.04 150);
    border-color: var(--accent);
  }
  .srs button.good .interval { color: var(--accent-ink); }
  .srs.hidden { visibility: hidden; }

  .done-screen {
    flex: 1;
    display: none;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    padding: 0 12px;
  }
  body.session-done .card,
  body.session-done .srs,
  body.session-done .progress-rail,
  body.session-done .topbar .skip,
  body.session-done .topbar .pos { display: none; }
  body.session-done .done-screen { display: flex; }
  .done-screen .kicker {
    font: 11px/1 var(--font-mono);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent-ink);
    margin-bottom: 14px;
  }
  .done-screen .headline {
    font: 500 36px/1.1 var(--font-display);
    letter-spacing: -0.02em;
    margin-bottom: 22px;
  }
  .done-screen .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
    text-align: left;
  }
  .done-screen .stats .cell {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    background: var(--surface);
  }
  .done-screen .stats .num {
    font: 500 24px/1 var(--font-display);
    margin-bottom: 4px;
  }
  .done-screen .stats .lbl {
    font: 10px/1 var(--font-mono);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .done-screen .cta {
    display: inline-block;
    background: var(--fg);
    color: var(--bg);
    padding: 14px 22px;
    border-radius: 999px;
    font: 600 14px/1 var(--font-body);
    letter-spacing: -0.005em;
    cursor: pointer;
    border: 0;
  }
</style>
</head>

    var card  = document.getElementById('card');
    var srs   = document.getElementById('srs');
    var rail  = document.getElementById('rail');
    var curEl = document.getElementById('cur');
    var totEl = document.getElementById('tot');
    var skip  = document.getElementById('skip');
    var restart = document.getElementById('restart');
    var idx = 0;
    var stats = { good: 0, hard: 0, again: 0 };

    totEl.textContent = DECK.length;

    DECK.forEach(function () {
      rail.appendChild(document.createElement('span'));
    });

    function paintRail() {
      var spans = rail.children;
      for (var i = 0; i < spans.length; i++) {
        spans[i].className = '';
        if (i < idx) spans[i].classList.add('done');
        if (i === idx) spans[i].classList.add('active');
      }
    }

    var seNowEl = document.getElementById('se-now');

    function renderCard() {
      var w = DECK[idx];
      card.classList.remove('revealed');
      srs.classList.add('hidden');
      curEl.textContent = idx + 1;
      seNowEl.textContent = w.se;
      paintRail();

      var epHtml = w.ep
        ? '<div class="ep-line"><span class="ep-label">' + w.se + '</span> · ' + w.ep + '</div>'
        : '<div class="ep-line"><span class="ep-label">' + w.se + '</span></div>';

      card.innerHTML =
        '<header class="card-head">' +
          '<div class="src"><span class="show">Silicon Valley</span> · ' + w.se + '</div>' +
          '<div class="tag">' + w.tag + '</div>' +
        '</header>' +
        '<div class="term-block">' +
          '<h1 class="term">' + w.term + '</h1>' +
          '<div class="ipa-row">' +
            '<span class="pos">' + w.pos + '</span>' +
            '<span class="ipa">' + w.ipa + '</span>' +
            '<button class="audio" id="audio-btn" aria-label="Play pronunciation" type="button">▶</button>' +
          '</div>' +
        '</div>' +
        '<button class="reveal-trigger" id="reveal" type="button">Tap to reveal</button>' +
        '<div class="body">' +
          '<div class="gloss-block">' +
            '<div class="label">释义 · ZH</div>' +
            '<div class="zh">' + w.zh + '</div>' +
            '<div class="en">' + w.en + '</div>' +
          '</div>' +
          epHtml +
        '</div>';

      document.getElementById('reveal').addEventListener('click', function () {
        card.classList.add('revealed');
        srs.classList.remove('hidden');
      });

      wireAudio(w.term);
    }

    var ttsSupported = typeof window.speechSynthesis !== 'undefined' &&
                       typeof window.SpeechSynthesisUtterance !== 'undefined';
    var enVoice = null;
    function pickVoice() {
      if (!ttsSupported) return;
      var voices = window.speechSynthesis.getVoices();
      if (!voices || !voices.length) return;
      enVoice =
        voices.find(function (v) { return /en[-_]US/i.test(v.lang) && /Samantha|Ava|Alex|Karen|Daniel/i.test(v.name); }) ||
        voices.find(function (v) { return /en[-_]US/i.test(v.lang); }) ||
        voices.find(function (v) { return /^en/i.test(v.lang); }) ||
        null;
    }
    if (ttsSupported) {
      pickVoice();
      window.speechSynthesis.onvoiceschanged = pickVoice;
    }

    function speak(text) {
      if (!ttsSupported) return null;
      try { window.speechSynthesis.cancel(); } catch (_) {}
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = 0.92;
      u.pitch = 1;
      if (enVoice) u.voice = enVoice;
      window.speechSynthesis.speak(u);
      return u;
    }

    function wireAudio(term) {
      var btn = document.getElementById('audio-btn');
      if (!btn) return;
      if (!ttsSupported) {
        btn.classList.add('unsupported');
        btn.title = 'Pronunciation unavailable in this browser';
        btn.setAttribute('aria-disabled', 'true');
        return;
      }
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (btn.classList.contains('playing')) {
          try { window.speechSynthesis.cancel(); } catch (_) {}
          btn.classList.remove('playing');
          return;
        }
        var u = speak(term);
        if (!u) return;
        btn.classList.add('playing');
        u.onend   = function () { btn.classList.remove('playing'); };
        u.onerror = function () { btn.classList.remove('playing'); };
      });
    }

    function advance(rate) {
      if (rate && stats[rate] !== undefined) stats[rate]++;
      idx++;
      if (idx >= DECK.length) {
        document.getElementById('s-good').textContent  = stats.good;
        document.getElementById('s-hard').textContent  = stats.hard;
        document.getElementById('s-again').textContent = stats.again;
        document.getElementById('s-total').textContent = DECK.length;
        document.body.classList.add('session-done');
        return;
      }
      renderCard();
    }

    srs.addEventListener('click', function (e) {
      var btn = e.target.closest('button[data-rate]');
      if (!btn) return;
      advance(btn.getAttribute('data-rate'));
    });

    skip.addEventListener('click', function () { advance(null); });

    restart.addEventListener('click', function () {
      idx = 0;
      stats = { good: 0, hard: 0, again: 0 };
      document.body.classList.remove('session-done');
      renderCard();
    });

    renderCard();
  </script>
